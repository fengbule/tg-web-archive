services:
  app:
    build: .
    container_name: telegram-video-manager
    restart: unless-stopped
    env_file: .env
    environment:
      USE_X_ACCEL: "${USE_X_ACCEL:-true}"
    volumes:
      - /data/telegram-video-manager:/data/telegram-video-manager
    expose:
      - "8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  nginx:
    image: nginx:1.27-alpine
    container_name: telegram-video-manager-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/telegram-video-manager/media:/data/telegram-video-manager/media:ro
    security_opt:
      - no-new-privileges:true
